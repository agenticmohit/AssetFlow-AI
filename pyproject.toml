[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q --disable-warnings --strict-markers"

[tool.coverage.run]
source = ["assetflow"]
branch = true

[tool.coverage.report]
show_missing = true
skip_covered = true
fail_under = 80

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501", "B008"]
